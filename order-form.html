<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Form | Matthews Custom Creations</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<script>

function toggleMenu()
{
document.getElementById("navMenu").classList.toggle("menu-open");
document.getElementById("menuOverlay").classList.toggle("overlay-open");
document.getElementById("socialFooter").classList.toggle("footer-hidden");
}

function closeMenu()
{
document.getElementById("navMenu").classList.remove("menu-open");
document.getElementById("menuOverlay").classList.remove("overlay-open");
document.getElementById("socialFooter").classList.remove("footer-hidden");
}

</script>

<body>

<header class="header">

<div class="header-left">
<img src="images/logo.jpg" class="logo">
</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<nav class="header-right" id="navMenu">
<a href="index.html" class="nav-button" onclick="closeMenu()">Home</a>
<a href="order.html" class="nav-button" onclick="closeMenu()">Shop</a>
<a href="order-form.html" class="nav-button" onclick="closeMenu()">Custom Order</a>
<a href="events.html" class="nav-button" onclick="closeMenu()">Events</a>
<a href="contact.html" class="nav-button" onclick="closeMenu()">Contact</a>
</nav>

<div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

</header>


<main class="main">

<h1>Custom Order</h1>
<p>Submit a custom order request and we will see if we can accommodate it!</p>

<div class="order-layout">

<!-- FORM -->
<form class="custom-form" method="POST" data-netlify="true">

<input type="hidden" name="form-name" value="custom-order">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Product Type</label>
<select name="product" id="productSelect" required>
<option value="">Select a product</option>
<option value="drinkware">Drinkware</option>
<option value="wood-sign">Wood Sign</option>
<option value="slate-coaster">Slate Coaster</option>
<option value="vinyl-shirt">Vinyl Shirt</option>
</select>

<!-- PREVIEW INPUTS -->
<label>Text to engrave (optional)</label>
<input type="text" id="previewText" name="preview_text" placeholder="Example: 'Chase' or 'Happy Birthday'">

<div class="two-col-controls">
<div>
<label>Text Size</label>
<input type="range" id="textSize" min="18" max="80" value="42">
</div>

<div>
<label>Text Position (Up/Down)</label>
<input type="range" id="textY" min="0" max="100" value="70">
</div>
</div>

<label>Upload image (optional)</label>
<input type="file" id="imageUpload" name="artwork_upload" accept="image/*">

<div class="two-col-controls">
<div>
<label>Image Size</label>
<input type="range" id="imgScale" min="10" max="140" value="70">
</div>

<div>
<label>Image Position (Up/Down)</label>
<input type="range" id="imgY" min="0" max="100" value="45">
</div>
</div>

<label>Order Details</label>
<textarea name="details"
placeholder="Describe what you want engraved: text, font style (if known), size, placement, and any special instructions. Example: 'Front center, name Chase in script font, small maple leaf under it.'"
required></textarea>

<button type="submit">Submit Order</button>

</form>


<!-- LIVE PREVIEW -->
<div class="product-preview">

<div class="preview-title">Live Preview</div>

<div class="preview-stage">
<canvas id="previewCanvas" width="900" height="900"></canvas>
</div>

<div class="preview-note">
This is a visual mockup to help show placement. Final engraving may vary slightly.
</div>

</div>

</div>

</main>


<script>

/* ==========================
   PRODUCT TEMPLATE MAP
========================== */

const productTemplates =
{
"drinkware": "images/drinkware.png",
"wood-sign": "images/woodsign.png",
"slate-coaster": "images/coasters.png",
"vinyl-shirt": "images/shirt.png"
};

const productSelect = document.getElementById("productSelect");
const previewText = document.getElementById("previewText");
const textSize = document.getElementById("textSize");
const textY = document.getElementById("textY");

const imageUpload = document.getElementById("imageUpload");
const imgScale = document.getElementById("imgScale");
const imgY = document.getElementById("imgY");

const canvas = document.getElementById("previewCanvas");
const ctx = canvas.getContext("2d");

let baseImg = new Image();
let userImg = null;

/* Draw helper */
function drawPreview()
{
ctx.clearRect(0, 0, canvas.width, canvas.height);

/* draw base */
if (baseImg && baseImg.complete && baseImg.naturalWidth)
{
drawFitImage(baseImg);
}

/* draw user image */
if (userImg)
{
drawUserArtwork(userImg);
}

/* draw text */
const txt = previewText.value.trim();
if (txt.length > 0)
{
drawUserText(txt);
}
}

/* Fit base image to canvas */
function drawFitImage(img)
{
const cw = canvas.width;
const ch = canvas.height;

const ir = img.naturalWidth / img.naturalHeight;
const cr = cw / ch;

let w, h, x, y;

if (ir > cr)
{
w = cw;
h = cw / ir;
x = 0;
y = (ch - h) / 2;
}
else
{
h = ch;
w = ch * ir;
x = (cw - w) / 2;
y = 0;
}

ctx.drawImage(img, x, y, w, h);
}

/* Overlay uploaded image with sizing and position */
function drawUserArtwork(img)
{
const cw = canvas.width;
const ch = canvas.height;

const scalePct = Number(imgScale.value) / 100; /* 0.10 to 1.40 */
const targetW = cw * 0.55 * scalePct;
const targetH = targetW * (img.naturalHeight / img.naturalWidth);

const x = (cw - targetW) / 2;
const y = (ch * (Number(imgY.value) / 100)) - (targetH / 2);

ctx.save();
ctx.globalAlpha = 0.95;
ctx.drawImage(img, x, y, targetW, targetH);
ctx.restore();
}

/* Text render */
function drawUserText(txt)
{
const cw = canvas.width;
const ch = canvas.height;

const size = Number(textSize.value);
const y = ch * (Number(textY.value) / 100);

ctx.save();

/* glow-ish outline so white text stays visible */
ctx.font = `bold ${size}px Arial`;
ctx.textAlign = "center";
ctx.textBaseline = "middle";

ctx.lineWidth = Math.max(4, Math.floor(size / 10));
ctx.strokeStyle = "rgba(0,0,0,0.75)";
ctx.strokeText(txt, cw / 2, y);

ctx.fillStyle = "white";
ctx.fillText(txt, cw / 2, y);

ctx.restore();
}

/* Load base template */
function setBaseTemplate(key)
{
const src = productTemplates[key];
if (!src)
{
ctx.clearRect(0, 0, canvas.width, canvas.height);
return;
}

baseImg = new Image();
baseImg.onload = () => drawPreview();
baseImg.src = src;
}

/* React to changes */
productSelect.addEventListener("change", () =>
{
setBaseTemplate(productSelect.value);
});

previewText.addEventListener("input", drawPreview);
textSize.addEventListener("input", drawPreview);
textY.addEventListener("input", drawPreview);

imgScale.addEventListener("input", drawPreview);
imgY.addEventListener("input", drawPreview);

imageUpload.addEventListener("change", (e) =>
{
const file = e.target.files && e.target.files[0];
if (!file)
{
userImg = null;
drawPreview();
return;
}

const reader = new FileReader();
reader.onload = () =>
{
const img = new Image();
img.onload = () =>
{
userImg = img;
drawPreview();
};
img.src = reader.result;
};
reader.readAsDataURL(file);
});

/* AUTO-FILL FROM TILE PAGE (order.html -> order-form.html?product=xxx) */
const params = new URLSearchParams(window.location.search);
const productParam = params.get("product");

if (productParam)
{
productSelect.value = productParam;
setBaseTemplate(productParam);
}
else
{
/* default blank canvas until chosen */
ctx.clearRect(0, 0, canvas.width, canvas.height);
}

</script>

</body>
</html>
